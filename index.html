<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>精神避难所</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 森林 -->
<div class="scene scene-forest active" id="scene-forest">
  <div class="particles" id="particles-forest"></div>
</div>

<!-- 深海 -->
<div class="scene scene-ocean" id="scene-ocean">
  <div class="light-rays" id="rays-ocean"></div>
  <div class="bubbles" id="bubbles-ocean"></div>
</div>

<!-- 星空 -->
<div class="scene scene-stars" id="scene-stars">
  <div class="starfield" id="starfield"></div>
</div>

<!-- 雨夜 -->
<div class="scene scene-rain" id="scene-rain">
  <div class="rainfield" id="rainfield"></div>
</div>

<!-- 中央内容 -->
<div class="overlay">
  <div class="clock" id="clock">00:00</div>
  <div class="date-text" id="dateText"></div>
  <div class="quote" id="quote"></div>
  <div class="breath-circle"></div>
</div>

<!-- 声音开关 -->
<button class="sound-toggle on" id="soundToggle" title="声音">&#9834;</button>

<!-- 场景切换 -->
<div class="scene-switcher">
  <button class="scene-btn active" data-scene="forest" title="森林">&#127795;</button>
  <button class="scene-btn" data-scene="ocean" title="深海">&#127754;</button>
  <button class="scene-btn" data-scene="stars" title="星空">&#127756;</button>
  <button class="scene-btn" data-scene="rain" title="雨夜">&#127783;</button>
</div>

<script src="js/main.js"></script>
</body>
</html>
