<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>精神避难所</title>
  <link rel="stylesheet" href="css/style.css?v=33">
</head>
<body>

<div id="eye-entrance">
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <filter id="eye-feather" x="-20%" y="-80%" width="140%" height="260%">
        <feGaussianBlur stdDeviation="18" />
      </filter>
      <mask id="eye-mask" maskUnits="userSpaceOnUse">
        <rect id="eye-mask-bg" x="0" y="0" width="1920" height="1080" fill="white" />
        <path id="eye-hole" fill="black" filter="url(#eye-feather)"></path>
      </mask>
    </defs>
  </svg>
</div>

<div id="chat-overlay">
  <div class="stars"></div>
  <div id="chat-fade-text"></div>
  <div id="chat-cursor"></div>
  <input type="text" id="chat-input" autocomplete="off">
</div>

<div id="loading">...</div>

<div id="scene-transition"><div class="transition-text">换一个地方</div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="js/audio.js?v=6"></script>
<script src="js/eye-transition.js?v=1"></script>
<script src="js/chat.js?v=37"></script>
<script src="js/scene.js?v=23"></script>
<script src="js/main.js?v=7"></script>
</body>
</html>
